name: Hairmap iOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hairmap-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validate and build iOS app
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run Hairmap CI checks
        run: tools/ci_check.sh
